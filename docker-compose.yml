version: '3.8'

services:
  web:
    build: .
    container_name: alias_web
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MYSQL_HOST=db
      - MYSQL_USER=adminAlias
      - MYSQL_PASSWORD=passwordadmin
      - MYSQL_DB=alias_db
      - SECRET_KEY=your_secure_random_key_123
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  db:
    image: mysql:8.0
    container_name: alias_db
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword123
      - MYSQL_DATABASE=alias_db
      - MYSQL_USER=adminAlias
      - MYSQL_PASSWORD=passwordadmin
    volumes:
      - db_data:/var/lib/mysql
      - "./mySQL migration/DATABASE_MASTER.sql:/docker-entrypoint-initdb.d/init.sql"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
